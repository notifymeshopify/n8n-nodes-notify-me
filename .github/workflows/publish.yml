name: Publish to npm

# Runs when a version tag is pushed (e.g. `git tag v1.0.3 && git push --tags`).
# Also runs on manual dispatch from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required to generate the npm provenance statement via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        # --ignore-scripts skips postinstall build steps in transitive deps
        # (isolated-vm's native C++ build fails on newer Node against older v8 headers).
        # We only need TypeScript definitions from n8n-workflow for compilation;
        # no runtime code from those deps executes here.
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
